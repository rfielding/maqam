# Pin to the exact stable version this project was built and tested against.
# rustup will automatically download this toolchain on first `cargo build`.
#
# To install manually:
#   rustup toolchain install 1.85.0
#   rustup override set 1.85.0
#
# 1.85.0 is the stable floor; we verified compilation on 1.95.0.
# The project uses only edition-2021 features available since 1.56.

[toolchain]
channel  = "1.85.0"
components = ["rustfmt", "clippy"]
